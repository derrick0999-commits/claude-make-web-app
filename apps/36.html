<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深色模式蕃茄時鐘</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-2: rgba(255, 255, 255, 0.12);
      --text: #f4f7fb;
      --muted: #9aa4b2;
      --primary: #ff5c7a;
      --primary-2: #ff8aa0;
      --green: #37d67a;
      --blue: #58a6ff;
      --yellow: #ffd166;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 92, 122, 0.25), transparent 34%),
        radial-gradient(circle at bottom right, rgba(88, 166, 255, 0.22), transparent 38%),
        linear-gradient(135deg, #0b0d17, var(--bg));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 22px;
      align-items: stretch;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .main {
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0.04em;
    }

    .badge {
      color: var(--muted);
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      padding: 8px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .tabs {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0 26px;
    }

    button {
      border: 0;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .tab {
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      font-weight: 700;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      box-shadow: 0 12px 25px rgba(255, 92, 122, 0.28);
    }

    .timer-wrap {
      position: relative;
      width: min(390px, 86vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      margin: 4px 0 24px;
    }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      overflow: visible;
    }

    .track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 14;
    }

    .progress {
      fill: none;
      stroke: var(--primary);
      stroke-width: 14;
      stroke-linecap: round;
      filter: drop-shadow(0 0 14px rgba(255, 92, 122, 0.55));
      transition: stroke-dashoffset 0.35s linear, stroke 0.2s ease;
    }

    .time-box {
      width: 77%;
      height: 77%;
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.12), transparent 45%),
        rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.11);
    }

    .time {
      font-size: clamp(58px, 11vw, 94px);
      font-weight: 850;
      letter-spacing: -0.06em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .state {
      margin-top: 12px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      width: 100%;
    }

    .primary-btn {
      min-width: 150px;
      padding: 16px 28px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      font-weight: 900;
      font-size: 18px;
      box-shadow: 0 14px 30px rgba(255, 92, 122, 0.28);
    }

    .ghost-btn {
      padding: 16px 22px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-weight: 800;
    }

    .ghost-btn:hover,
    .tab:hover {
      background: rgba(255, 255, 255, 0.13);
    }

    .side {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .section {
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 22px;
      padding: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 17px;
      letter-spacing: 0.03em;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.16);
    }

    .stat .num {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .stat .label {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: grid;
      grid-template-columns: 1fr 86px;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    input[type="number"] {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.13);
      outline: none;
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 12px;
      font: inherit;
      font-weight: 800;
      text-align: center;
    }

    .small-btn {
      width: 100%;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.09);
      font-weight: 800;
    }

    .tip {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      margin: 0;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-top: 10px;
    }

    .switch {
      position: relative;
      width: 52px;
      height: 30px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      transition: 0.2s;
      cursor: pointer;
    }

    .slider:before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 4px;
      top: 4px;
      border-radius: 50%;
      background: white;
      transition: 0.2s;
    }

    .switch input:checked + .slider {
      background: var(--primary);
    }

    .switch input:checked + .slider:before {
      transform: translateX(22px);
    }

    .footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.36);
      font-size: 12px;
      margin-top: auto;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .side {
        order: 2;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .badge {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="card main">
      <header>
        <h1>蕃茄時鐘</h1>
        <div class="badge" id="badge">專注 25 分鐘</div>
      </header>

      <div class="tabs" role="tablist" aria-label="模式切換">
        <button class="tab active" data-mode="pomodoro">專注</button>
        <button class="tab" data-mode="short">短休息</button>
        <button class="tab" data-mode="long">長休息</button>
      </div>

      <section class="timer-wrap" aria-label="倒數計時器">
        <svg viewBox="0 0 300 300" aria-hidden="true">
          <circle class="track" cx="150" cy="150" r="134"></circle>
          <circle class="progress" id="progress" cx="150" cy="150" r="134"></circle>
        </svg>
        <div class="time-box">
          <div>
            <div class="time" id="time">25:00</div>
            <div class="state" id="state">準備開始</div>
          </div>
        </div>
      </section>

      <div class="controls">
        <button class="primary-btn" id="startPause">開始</button>
        <button class="ghost-btn" id="reset">重設</button>
        <button class="ghost-btn" id="skip">跳過</button>
      </div>
    </main>

    <aside class="card side">
      <section class="section">
        <h2>今日統計</h2>
        <div class="stat-grid">
          <div class="stat">
            <div class="num" id="doneCount">0</div>
            <div class="label">完成蕃茄</div>
          </div>
          <div class="stat">
            <div class="num" id="cycleCount">0</div>
            <div class="label">目前輪次</div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>時間設定</h2>
        <label class="field">
          <span>專注分鐘</span>
          <input id="pomodoroInput" type="number" min="1" max="180" value="25" />
        </label>
        <label class="field">
          <span>短休息分鐘</span>
          <input id="shortInput" type="number" min="1" max="60" value="5" />
        </label>
        <label class="field">
          <span>長休息分鐘</span>
          <input id="longInput" type="number" min="1" max="90" value="15" />
        </label>
        <button class="small-btn" id="saveSettings">套用設定</button>
      </section>

      <section class="section">
        <h2>偏好</h2>
        <div class="switch-row">
          <span>自動進入下一段</span>
          <label class="switch">
            <input type="checkbox" id="autoNext" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div class="switch-row">
          <span>完成音效</span>
          <label class="switch">
            <input type="checkbox" id="soundOn" checked />
            <span class="slider"></span>
          </label>
        </div>
        <button class="small-btn" id="notifyBtn">啟用桌面通知</button>
      </section>

      <section class="section">
        <p class="tip">建議流程：專注 25 分鐘後休息 5 分鐘；每完成 4 顆蕃茄，改休息 15 分鐘。</p>
      </section>

      <div class="footer">Dark Pomodoro Timer</div>
    </aside>
  </div>

  <script>
    const timeEl = document.getElementById("time");
    const stateEl = document.getElementById("state");
    const badgeEl = document.getElementById("badge");
    const startPauseBtn = document.getElementById("startPause");
    const resetBtn = document.getElementById("reset");
    const skipBtn = document.getElementById("skip");
    const progressEl = document.getElementById("progress");
    const doneCountEl = document.getElementById("doneCount");
    const cycleCountEl = document.getElementById("cycleCount");
    const tabs = [...document.querySelectorAll(".tab")];

    const pomodoroInput = document.getElementById("pomodoroInput");
    const shortInput = document.getElementById("shortInput");
    const longInput = document.getElementById("longInput");
    const saveSettingsBtn = document.getElementById("saveSettings");
    const autoNextEl = document.getElementById("autoNext");
    const soundOnEl = document.getElementById("soundOn");
    const notifyBtn = document.getElementById("notifyBtn");

    const radius = 134;
    const circumference = 2 * Math.PI * radius;
    progressEl.style.strokeDasharray = circumference;

    let settings = {
      pomodoro: 25,
      short: 5,
      long: 15
    };

    let mode = "pomodoro";
    let totalSeconds = settings[mode] * 60;
    let remainingSeconds = totalSeconds;
    let timer = null;
    let isRunning = false;
    let completedPomodoros = Number(localStorage.getItem("completedPomodoros") || 0);
    let currentCycle = Number(localStorage.getItem("currentCycle") || 0);

    const modeInfo = {
      pomodoro: { label: "專注", color: "#ff5c7a", next: "short" },
      short: { label: "短休息", color: "#37d67a", next: "pomodoro" },
      long: { label: "長休息", color: "#58a6ff", next: "pomodoro" }
    };

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${pad(m)}:${pad(s)}`;
    }

    function updateTitle() {
      document.title = `${formatTime(remainingSeconds)}｜${modeInfo[mode].label}｜蕃茄時鐘`;
    }

    function updateProgress() {
      const ratio = totalSeconds === 0 ? 0 : remainingSeconds / totalSeconds;
      progressEl.style.strokeDashoffset = circumference * (1 - ratio);
    }

    function updateUI() {
      timeEl.textContent = formatTime(remainingSeconds);
      stateEl.textContent = isRunning ? "進行中" : "暫停中";
      if (!isRunning && remainingSeconds === totalSeconds) stateEl.textContent = "準備開始";
      badgeEl.textContent = `${modeInfo[mode].label} ${settings[mode]} 分鐘`;
      progressEl.style.stroke = modeInfo[mode].color;
      document.documentElement.style.setProperty("--primary", modeInfo[mode].color);
      doneCountEl.textContent = completedPomodoros;
      cycleCountEl.textContent = currentCycle;
      tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.mode === mode));
      startPauseBtn.textContent = isRunning ? "暫停" : "開始";
      updateProgress();
      updateTitle();
    }

    function setMode(nextMode, keepRunning = false) {
      mode = nextMode;
      totalSeconds = settings[mode] * 60;
      remainingSeconds = totalSeconds;
      stopTimer();
      if (keepRunning) startTimer();
      updateUI();
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      updateUI();

      timer = setInterval(() => {
        remainingSeconds--;

        if (remainingSeconds <= 0) {
          remainingSeconds = 0;
          updateUI();
          finishSegment();
          return;
        }

        updateUI();
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timer);
      timer = null;
      isRunning = false;
      updateUI();
    }

    function resetTimer() {
      stopTimer();
      remainingSeconds = totalSeconds;
      updateUI();
    }

    function finishSegment() {
      stopTimer();
      playBeep();

      let title = "";
      let body = "";

      if (mode === "pomodoro") {
        completedPomodoros++;
        currentCycle++;
        localStorage.setItem("completedPomodoros", completedPomodoros);
        localStorage.setItem("currentCycle", currentCycle);

        title = "專注完成！";
        body = currentCycle % 4 === 0 ? "很棒，該進入長休息了。" : "很好，休息 5 分鐘吧。";
      } else {
        title = "休息結束！";
        body = "準備回到專注時間。";
      }

      showNotification(title, body);

      let nextMode;
      if (mode === "pomodoro") {
        nextMode = currentCycle % 4 === 0 ? "long" : "short";
      } else {
        nextMode = "pomodoro";
      }

      setMode(nextMode, autoNextEl.checked);
    }

    function skipSegment() {
      finishSegment();
    }

    function playBeep() {
      if (!soundOnEl.checked) return;

      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const now = ctx.currentTime;

        [0, 0.18, 0.36].forEach((offset, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.value = index === 1 ? 740 : 880;
          gain.gain.setValueAtTime(0.0001, now + offset);
          gain.gain.exponentialRampToValueAtTime(0.18, now + offset + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + offset + 0.14);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now + offset);
          osc.stop(now + offset + 0.16);
        });

        setTimeout(() => ctx.close(), 900);
      } catch (e) {}
    }

    function showNotification(title, body) {
      if (!("Notification" in window)) return;
      if (Notification.permission === "granted") {
        new Notification(title, { body });
      }
    }

    function applySettings() {
      const nextSettings = {
        pomodoro: clampNumber(pomodoroInput.value, 1, 180, 25),
        short: clampNumber(shortInput.value, 1, 60, 5),
        long: clampNumber(longInput.value, 1, 90, 15)
      };

      settings = nextSettings;
      localStorage.setItem("pomodoroSettings", JSON.stringify(settings));

      pomodoroInput.value = settings.pomodoro;
      shortInput.value = settings.short;
      longInput.value = settings.long;

      totalSeconds = settings[mode] * 60;
      remainingSeconds = totalSeconds;
      stopTimer();
      updateUI();
    }

    function clampNumber(value, min, max, fallback) {
      const num = Number(value);
      if (!Number.isFinite(num)) return fallback;
      return Math.min(max, Math.max(min, Math.round(num)));
    }

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem("pomodoroSettings"));
        if (saved) {
          settings.pomodoro = clampNumber(saved.pomodoro, 1, 180, 25);
          settings.short = clampNumber(saved.short, 1, 60, 5);
          settings.long = clampNumber(saved.long, 1, 90, 15);
        }
      } catch (e) {}

      pomodoroInput.value = settings.pomodoro;
      shortInput.value = settings.short;
      longInput.value = settings.long;
      totalSeconds = settings[mode] * 60;
      remainingSeconds = totalSeconds;
    }

    tabs.forEach(tab => {
      tab.addEventListener("click", () => setMode(tab.dataset.mode));
    });

    startPauseBtn.addEventListener("click", () => {
      if (isRunning) stopTimer();
      else startTimer();
    });

    resetBtn.addEventListener("click", resetTimer);
    skipBtn.addEventListener("click", skipSegment);
    saveSettingsBtn.addEventListener("click", applySettings);

    notifyBtn.addEventListener("click", async () => {
      if (!("Notification" in window)) {
        notifyBtn.textContent = "此瀏覽器不支援通知";
        return;
      }

      const permission = await Notification.requestPermission();
      notifyBtn.textContent = permission === "granted" ? "通知已啟用" : "通知未啟用";
    });

    document.addEventListener("visibilitychange", updateTitle);

    loadSettings();
    updateUI();
  </script>
</body>
</html>
