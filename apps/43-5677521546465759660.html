<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#87ceeb" />
  <title>天藍色日期倒數計時器</title>
  <style>
    :root{
      --sky-1:#eaf8ff;
      --sky-2:#cfefff;
      --sky-3:#a9def7;
      --sky-4:#87ceeb;
      --sky-5:#5bb8e6;
      --text:#11445a;
      --text-soft:#3f6e83;
      --card:#ffffffcc;
      --border:#ffffff99;
      --shadow:0 0.75rem 2rem rgba(32, 111, 145, 0.16);
      --radius:1.25rem;
    }

    *{box-sizing:border-box}
    html{font-size:16px}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 35%),
        linear-gradient(180deg, var(--sky-1) 0%, var(--sky-2) 40%, var(--sky-3) 100%);
    }

    .page{
      min-height:100dvh;
      padding:
        calc(env(safe-area-inset-top) + 1rem)
        1rem
        calc(env(safe-area-inset-bottom) + 1rem);
    }

    .wrap{
      width:min(100%, 48rem);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:1rem;
    }

    .hero{
      background:linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.68));
      border:1px solid var(--border);
      border-radius:1.5rem;
      box-shadow:var(--shadow);
      padding:1.25rem;
      backdrop-filter:blur(0.5rem);
    }

    h1{
      margin:0 0 0.5rem;
      font-size:clamp(1.6rem, 5vw, 2.5rem);
      line-height:1.2;
      letter-spacing:0.02em;
    }

    .subtitle{
      margin:0;
      font-size:clamp(0.95rem, 3.4vw, 1.1rem);
      color:var(--text-soft);
      line-height:1.6;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:1rem;
      backdrop-filter:blur(0.5rem);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:0.9rem;
    }

    @media (min-width: 42rem){
      .grid{
        grid-template-columns:1fr 1fr;
      }
    }

    label{
      display:block;
      margin-bottom:0.45rem;
      font-size:0.95rem;
      font-weight:700;
      color:var(--text);
    }

    input[type="text"],
    input[type="datetime-local"]{
      width:100%;
      padding:0.9rem 1rem;
      font-size:1rem;
      line-height:1.2;
      color:var(--text);
      background:#ffffffee;
      border:1px solid #c0e7f7;
      border-radius:1rem;
      outline:none;
      transition:0.2s ease;
    }

    input:focus{
      border-color:var(--sky-5);
      box-shadow:0 0 0 0.2rem rgba(91,184,230,0.2);
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:0.75rem;
      margin-top:0.25rem;
    }

    button{
      appearance:none;
      border:none;
      border-radius:999rem;
      padding:0.9rem 1.15rem;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:transform 0.12s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    button:active{transform:scale(0.98)}

    .primary{
      color:white;
      background:linear-gradient(180deg, #74c9ee, #49b3e7);
      box-shadow:0 0.5rem 1.2rem rgba(73,179,231,0.28);
    }

    .secondary{
      color:var(--text);
      background:#ffffffd9;
      border:1px solid #cbe8f5;
    }

    .danger{
      color:#7a2432;
      background:#fff2f4;
      border:1px solid #ffd2da;
    }

    .countdown{
      text-align:center;
      padding:1.25rem 1rem 1rem;
    }

    .event-name{
      margin:0 0 0.35rem;
      font-size:clamp(1.1rem, 4vw, 1.5rem);
      font-weight:800;
      color:var(--text);
      word-break:break-word;
    }

    .target-text{
      margin:0 0 1rem;
      color:var(--text-soft);
      font-size:0.95rem;
      line-height:1.5;
    }

    .time-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:0.8rem;
    }

    @media (min-width: 30rem){
      .time-grid{
        grid-template-columns:repeat(4, 1fr);
      }
    }

    .time-box{
      background:linear-gradient(180deg, rgba(255,255,255,0.95), rgba(240,251,255,0.92));
      border:1px solid #d5eef9;
      border-radius:1.2rem;
      padding:0.9rem 0.6rem;
      min-width:0;
    }

    .time-value{
      font-size:clamp(1.6rem, 8vw, 2.5rem);
      font-weight:900;
      line-height:1;
      color:#1b6f93;
      letter-spacing:0.02em;
    }

    .time-label{
      margin-top:0.4rem;
      font-size:0.88rem;
      color:var(--text-soft);
      font-weight:700;
    }

    .status{
      margin-top:1rem;
      font-size:1rem;
      font-weight:700;
      color:#1f789d;
      min-height:1.5em;
    }

    .tips{
      margin:0;
      padding-left:1.2rem;
      color:var(--text-soft);
      line-height:1.7;
      font-size:0.95rem;
    }

    .footer-note{
      text-align:center;
      color:var(--text-soft);
      font-size:0.85rem;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="wrap">
      <section class="hero">
        <h1>天藍色日期倒數計時器</h1>
        <p class="subtitle">設定事件名稱與目標日期時間，頁面會自動記住。重新整理或關掉後再打開，也會依照現在時間正確接續倒數。</p>
      </section>

      <section class="card">
        <div class="grid">
          <div>
            <label for="eventName">事件名稱</label>
            <input id="eventName" type="text" placeholder="例如：生日、旅行、考試、跨年" />
          </div>
          <div>
            <label for="targetDate">目標日期時間</label>
            <input id="targetDate" type="datetime-local" />
          </div>
        </div>
        <div class="actions">
          <button id="saveBtn" class="primary">儲存倒數</button>
          <button id="nowPlusWeekBtn" class="secondary">一週後</button>
          <button id="resetBtn" class="danger">重設</button>
        </div>
      </section>

      <section class="card countdown">
        <h2 id="displayName" class="event-name">尚未設定事件</h2>
        <p id="targetText" class="target-text">請先選擇一個未來日期時間。</p>

        <div class="time-grid">
          <div class="time-box">
            <div id="days" class="time-value">0</div>
            <div class="time-label">天</div>
          </div>
          <div class="time-box">
            <div id="hours" class="time-value">00</div>
            <div class="time-label">時</div>
          </div>
          <div class="time-box">
            <div id="minutes" class="time-value">00</div>
            <div class="time-label">分</div>
          </div>
          <div class="time-box">
            <div id="seconds" class="time-value">00</div>
            <div class="time-label">秒</div>
          </div>
        </div>

        <div id="status" class="status"></div>
      </section>

      <section class="card">
        <ul class="tips">
          <li>資料儲存在此頁面的瀏覽器本機儲存空間。</li>
          <li>倒數依目標時間重新計算，不需要一直開著網頁。</li>
          <li>按下「重設」可清除已儲存的設定與進度。</li>
        </ul>
      </section>

      <div class="footer-note">天空藍主題・手機優先・可自動還原狀態</div>
    </main>
  </div>

  <script>
    (function(){
      const KEY_PREFIX = location.pathname + '::';
      const STORAGE_KEY = KEY_PREFIX + 'sky-countdown-state';

      const els = {
        eventName: document.getElementById('eventName'),
        targetDate: document.getElementById('targetDate'),
        saveBtn: document.getElementById('saveBtn'),
        nowPlusWeekBtn: document.getElementById('nowPlusWeekBtn'),
        resetBtn: document.getElementById('resetBtn'),
        displayName: document.getElementById('displayName'),
        targetText: document.getElementById('targetText'),
        days: document.getElementById('days'),
        hours: document.getElementById('hours'),
        minutes: document.getElementById('minutes'),
        seconds: document.getElementById('seconds'),
        status: document.getElementById('status')
      };

      let state = {
        eventName: '',
        targetTime: null
      };

      function pad(n){
        return String(n).padStart(2, '0');
      }

      function formatLocalInputValue(date){
        const y = date.getFullYear();
        const m = pad(date.getMonth() + 1);
        const d = pad(date.getDate());
        const h = pad(date.getHours());
        const min = pad(date.getMinutes());
        return `${y}-${m}-${d}T${h}:${min}`;
      }

      function formatDisplayDate(ts){
        const d = new Date(ts);
        return new Intl.DateTimeFormat('zh-Hant-TW', {
          year:'numeric',
          month:'long',
          day:'numeric',
          weekday:'short',
          hour:'2-digit',
          minute:'2-digit',
          second:'2-digit'
        }).format(d);
      }

      function saveState(){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function loadState(){
        try{
          const raw = localStorage.getItem(STORAGE_KEY);
          if(!raw) return;
          const parsed = JSON.parse(raw);
          state.eventName = typeof parsed.eventName === 'string' ? parsed.eventName : '';
          state.targetTime = typeof parsed.targetTime === 'number' ? parsed.targetTime : null;
        }catch(e){}
      }

      function clearState(){
        localStorage.removeItem(STORAGE_KEY);
      }

      function syncInputsFromState(){
        els.eventName.value = state.eventName || '';
        els.targetDate.value = state.targetTime ? formatLocalInputValue(new Date(state.targetTime)) : '';
      }

      function setDefaultIfEmpty(){
        if(!state.targetTime){
          const nextWeek = new Date();
          nextWeek.setDate(nextWeek.getDate() + 7);
          nextWeek.setSeconds(0,0);
          els.targetDate.value = formatLocalInputValue(nextWeek);
        }
      }

      function updateView(){
        const name = state.eventName && state.eventName.trim() ? state.eventName.trim() : '我的倒數事件';
        const now = Date.now();

        if(!state.targetTime){
          els.displayName.textContent = '尚未設定事件';
          els.targetText.textContent = '請先選擇一個未來日期時間。';
          els.days.textContent = '0';
          els.hours.textContent = '00';
          els.minutes.textContent = '00';
          els.seconds.textContent = '00';
          els.status.textContent = '';
          return;
        }

        els.displayName.textContent = name;
        els.targetText.textContent = '目標時間：' + formatDisplayDate(state.targetTime);

        let diff = state.targetTime - now;
        const past = diff <= 0;
        if (past) diff = Math.abs(diff);

        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        els.days.textContent = String(days);
        els.hours.textContent = pad(hours);
        els.minutes.textContent = pad(minutes);
        els.seconds.textContent = pad(seconds);

        if (past) {
          els.status.textContent = '時間已到！已超過 ' + days + ' 天 ' + pad(hours) + ' 時 ' + pad(minutes) + ' 分 ' + pad(seconds) + ' 秒';
        } else {
          els.status.textContent = '距離目標還有';
        }
      }

      function saveFromInputs(){
        const name = els.eventName.value.trim();
        const val = els.targetDate.value;

        if(!val){
          alert('請先選擇目標日期時間。');
          return;
        }

        const ts = new Date(val).getTime();
        if(Number.isNaN(ts)){
          alert('日期格式無效，請重新選擇。');
          return;
        }

        state.eventName = name;
        state.targetTime = ts;
        saveState();
        updateView();
      }

      els.saveBtn.addEventListener('click', saveFromInputs);

      els.nowPlusWeekBtn.addEventListener('click', function(){
        const d = new Date();
        d.setDate(d.getDate() + 7);
        d.setSeconds(0,0);
        els.targetDate.value = formatLocalInputValue(d);
      });

      els.resetBtn.addEventListener('click', function(){
        if(!confirm('確定要清除已儲存的倒數設定嗎？')) return;
        state = { eventName:'', targetTime:null };
        clearState();
        syncInputsFromState();
        setDefaultIfEmpty();
        updateView();
      });

      els.eventName.addEventListener('input', function(){
        state.eventName = els.eventName.value;
        saveState();
        updateView();
      });

      els.targetDate.addEventListener('change', function(){
        if(!els.targetDate.value) return;
        const ts = new Date(els.targetDate.value).getTime();
        if(Number.isNaN(ts)) return;
        state.targetTime = ts;
        saveState();
        updateView();
      });

      loadState();
      syncInputsFromState();
      setDefaultIfEmpty();
      updateView();
      setInterval(updateView, 1000);
    })();
  </script>
</body>
</html>
