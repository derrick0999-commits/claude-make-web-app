<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>深色日期倒數計時器</title>
  <style>
    :root{
      --bg: #0b1020;
      --panel: #121a2f;
      --panel-2: #18233f;
      --text: #eef3ff;
      --muted: #9fb0d3;
      --accent: #7c9cff;
      --accent-2: #5eead4;
      --danger: #ff6b81;
      --border: rgba(255,255,255,.10);
      --shadow: 0 1.2rem 3rem rgba(0,0,0,.25);
      --radius: 1.25rem;
    }

    *{ box-sizing: border-box; }

    html{
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body{
      margin: 0;
      min-height: 100dvh;
      background:
        radial-gradient(circle at top right, rgba(124,156,255,.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(94,234,212,.12), transparent 24%),
        linear-gradient(180deg, #0a0f1d 0%, #0d1426 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      line-height: 1.5;
    }

    .page{
      min-height: 100dvh;
      padding:
        calc(env(safe-area-inset-top) + 1rem)
        1rem
        calc(env(safe-area-inset-bottom) + 1rem);
    }

    .wrap{
      width: min(100%, 48rem);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(.5rem);
    }

    .hero{
      padding: 1.25rem;
    }

    .title{
      margin: 0 0 .35rem;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: .02em;
    }

    .subtitle{
      margin: 0;
      color: var(--muted);
      font-size: clamp(.95rem, 2.6vw, 1.05rem);
    }

    .form{
      padding: 1rem;
      display: grid;
      gap: 1rem;
    }

    .field{
      display: grid;
      gap: .45rem;
    }

    .label{
      color: var(--muted);
      font-size: .95rem;
      font-weight: 600;
    }

    input, button{
      font: inherit;
    }

    .input, .datetime{
      width: 100%;
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 1rem;
      background: var(--panel);
      color: var(--text);
      padding: .9rem 1rem;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s ease, transform .08s ease, background .2s ease;
    }

    .input::placeholder{
      color: #7f90b7;
    }

    .input:focus, .datetime:focus{
      border-color: var(--accent);
      background: var(--panel-2);
    }

    .actions{
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
    }

    .btn{
      border: 0;
      border-radius: 999rem;
      padding: .9rem 1.1rem;
      cursor: pointer;
      font-weight: 700;
      transition: transform .08s ease, opacity .2s ease, filter .2s ease;
      min-width: 7rem;
    }

    .btn:active{
      transform: scale(.98);
    }

    .btn-primary{
      background: linear-gradient(135deg, var(--accent), #96adff);
      color: #081020;
    }

    .btn-secondary{
      background: #24314f;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-danger{
      background: rgba(255,107,129,.12);
      color: #ffc2cc;
      border: 1px solid rgba(255,107,129,.28);
    }

    .btn:hover{
      filter: brightness(1.05);
    }

    .countdown{
      padding: 1rem;
      display: grid;
      gap: 1rem;
    }

    .target-label{
      display: flex;
      flex-direction: column;
      gap: .25rem;
      padding: .25rem .1rem;
    }

    .event-name{
      font-size: clamp(1.15rem, 3.5vw, 1.5rem);
      font-weight: 800;
      word-break: break-word;
    }

    .target-time{
      color: var(--muted);
      font-size: .98rem;
    }

    .status{
      color: var(--accent-2);
      font-size: .95rem;
      font-weight: 700;
    }

    .status.expired{
      color: #ffd37c;
    }

    .grid{
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: .75rem;
    }

    .unit{
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: 1.1rem;
      padding: 1rem .75rem;
      text-align: center;
    }

    .num{
      font-size: clamp(1.8rem, 8vw, 3rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: .02em;
    }

    .txt{
      margin-top: .4rem;
      color: var(--muted);
      font-size: .95rem;
      font-weight: 600;
    }

    .tips{
      padding: 1rem;
      color: var(--muted);
      font-size: .92rem;
    }

    .empty{
      text-align: center;
      padding: 1.5rem 1rem;
      color: var(--muted);
    }

    @media (min-width: 40rem){
      .grid{
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .hero, .form, .countdown, .tips{
        padding: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="card hero">
        <h1 class="title">深色日期倒數計時器</h1>
        <p class="subtitle">設定目標日期後，會自動持續倒數，重新整理或關閉後也會接續保存。</p>
      </section>

      <section class="card form">
        <div class="field">
          <label class="label" for="eventName">事件名稱</label>
          <input id="eventName" class="input" type="text" maxlength="80" placeholder="例如：生日、出國、考試、跨年" />
        </div>

        <div class="field">
          <label class="label" for="targetDate">目標日期與時間</label>
          <input id="targetDate" class="datetime" type="datetime-local" />
        </div>

        <div class="actions">
          <button id="saveBtn" class="btn btn-primary" type="button">開始倒數</button>
          <button id="clearBtn" class="btn btn-secondary" type="button">清除設定</button>
          <button id="resetBtn" class="btn btn-danger" type="button">重設儲存狀態</button>
        </div>
      </section>

      <section class="card countdown">
        <div id="countdownContent"></div>
      </section>

      <section class="card tips">
        提示：本頁會將事件名稱與目標時間儲存在你的瀏覽器中，之後回來會自動還原。
      </section>
    </div>
  </main>

  <script>
    (function(){
      const KEY_PREFIX = location.pathname + "::";
      const STORAGE_KEY = KEY_PREFIX + "dark-date-countdown";

      const eventNameInput = document.getElementById("eventName");
      const targetDateInput = document.getElementById("targetDate");
      const saveBtn = document.getElementById("saveBtn");
      const clearBtn = document.getElementById("clearBtn");
      const resetBtn = document.getElementById("resetBtn");
      const countdownContent = document.getElementById("countdownContent");

      let state = {
        eventName: "",
        targetTime: null
      };

      let timer = null;

      function pad(n){
        return String(n).padStart(2, "0");
      }

      function toLocalDateTimeInputValue(date){
        const y = date.getFullYear();
        const m = pad(date.getMonth() + 1);
        const d = pad(date.getDate());
        const h = pad(date.getHours());
        const min = pad(date.getMinutes());
        return `${y}-${m}-${d}T${h}:${min}`;
      }

      function formatTarget(ts){
        const d = new Date(ts);
        return new Intl.DateTimeFormat("zh-Hant-TW", {
          year: "numeric",
          month: "long",
          day: "numeric",
          weekday: "long",
          hour: "2-digit",
          minute: "2-digit"
        }).format(d);
      }

      function loadState(){
        try{
          const raw = localStorage.getItem(STORAGE_KEY);
          if(!raw) return;
          const data = JSON.parse(raw);
          if(data && typeof data === "object"){
            state.eventName = typeof data.eventName === "string" ? data.eventName : "";
            state.targetTime = typeof data.targetTime === "number" ? data.targetTime : null;
          }
        }catch(e){}
      }

      function saveState(){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function clearState(){
        state = { eventName: "", targetTime: null };
        localStorage.removeItem(STORAGE_KEY);
      }

      function renderEmpty(){
        countdownContent.innerHTML = `
          <div class="empty">
            尚未設定倒數日期，請先輸入事件名稱與目標日期。
          </div>
        `;
      }

      function getParts(ms){
        const totalSeconds = Math.max(0, Math.floor(ms / 1000));
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return { days, hours, minutes, seconds };
      }

      function renderCountdown(){
        if(!state.targetTime){
          renderEmpty();
          return;
        }

        const now = Date.now();
        const diff = state.targetTime - now;
        const expired = diff <= 0;
        const parts = getParts(diff);
        const eventTitle = state.eventName.trim() || "未命名事件";

        countdownContent.innerHTML = `
          <div class="target-label">
            <div class="event-name">${escapeHtml(eventTitle)}</div>
            <div class="target-time">目標時間：${escapeHtml(formatTarget(state.targetTime))}</div>
            <div class="status ${expired ? "expired" : ""}">
              ${expired ? "時間已到" : "剩餘時間"}
            </div>
          </div>
          <div class="grid">
            <div class="unit">
              <div class="num">${parts.days}</div>
              <div class="txt">天</div>
            </div>
            <div class="unit">
              <div class="num">${pad(parts.hours)}</div>
              <div class="txt">小時</div>
            </div>
            <div class="unit">
              <div class="num">${pad(parts.minutes)}</div>
              <div class="txt">分鐘</div>
            </div>
            <div class="unit">
              <div class="num">${pad(parts.seconds)}</div>
              <div class="txt">秒</div>
            </div>
          </div>
        `;
      }

      function escapeHtml(str){
        return str
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function syncInputsFromState(){
        eventNameInput.value = state.eventName || "";
        targetDateInput.value = state.targetTime ? toLocalDateTimeInputValue(new Date(state.targetTime)) : "";
      }

      function startTick(){
        if(timer) clearInterval(timer);
        renderCountdown();
        timer = setInterval(renderCountdown, 1000);
      }

      saveBtn.addEventListener("click", function(){
        const name = eventNameInput.value.trim();
        const rawDate = targetDateInput.value;

        if(!rawDate){
          alert("請先選擇目標日期與時間");
          targetDateInput.focus();
          return;
        }

        const ts = new Date(rawDate).getTime();
        if(Number.isNaN(ts)){
          alert("日期格式無效，請重新選擇");
          targetDateInput.focus();
          return;
        }

        state.eventName = name;
        state.targetTime = ts;
        saveState();
        renderCountdown();
      });

      clearBtn.addEventListener("click", function(){
        if(!confirm("要清除目前的倒數設定嗎？")) return;
        clearState();
        syncInputsFromState();
        renderCountdown();
      });

      resetBtn.addEventListener("click", function(){
        if(!confirm("要重設並清除這個頁面已儲存的所有倒數狀態嗎？")) return;
        clearState();
        syncInputsFromState();
        renderCountdown();
      });

      loadState();
      syncInputsFromState();
      startTick();
    })();
  </script>
</body>
</html>
