<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>亞古獸水墨畫</title>
  <style>
    :root{
      --bg:#f5f1e8;
      --paper:#fbf8f1;
      --ink:#161616;
      --ink-soft:#3d3d3d;
      --wash:#6e6a63;
      --accent:#8b2e1f;
      --line:rgba(0,0,0,.14);
      --shadow:rgba(0,0,0,.09);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:
        radial-gradient(circle at 20% 10%, rgba(0,0,0,.03), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(0,0,0,.025), transparent 26%),
        linear-gradient(180deg, #f7f4ec 0%, #f0ebdf 100%);
      color:var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }
    body{
      min-height:100dvh;
    }
    .page{
      min-height:100dvh;
      padding:
        calc(env(safe-area-inset-top) + 1rem)
        1rem
        calc(env(safe-area-inset-bottom) + 1rem);
      display:flex;
      flex-direction:column;
      gap:1rem;
    }
    .wrap{
      width:min(100%, 54rem);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:1rem;
    }
    .card{
      background:rgba(251,248,241,.78);
      border:1px solid rgba(0,0,0,.08);
      border-radius:1.2rem;
      box-shadow:0 .5rem 1.2rem var(--shadow);
      backdrop-filter: blur(.2rem);
    }
    .topbar{
      padding:1rem;
      display:flex;
      flex-direction:column;
      gap:.8rem;
    }
    .title{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:1rem;
      flex-wrap:wrap;
    }
    h1{
      margin:0;
      font-size:clamp(1.45rem, 4vw, 2.2rem);
      line-height:1.2;
      letter-spacing:.03em;
      font-weight:800;
    }
    .sub{
      margin:.25rem 0 0;
      color:var(--ink-soft);
      font-size:clamp(.92rem, 2.8vw, 1rem);
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:.65rem;
      align-items:center;
    }
    button{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:999rem;
      padding:.8rem 1rem;
      font-size:.98rem;
      line-height:1;
      background:#1e1e1e;
      color:#fff;
      box-shadow:0 .28rem .8rem rgba(0,0,0,.12);
      transition:transform .12s ease, opacity .12s ease, background .2s ease;
    }
    button:active{transform:scale(.98)}
    button.secondary{
      background:#ece5d8;
      color:#232323;
      border:1px solid rgba(0,0,0,.08);
      box-shadow:none;
    }
    button.ghost{
      background:transparent;
      color:#333;
      border:1px dashed rgba(0,0,0,.2);
      box-shadow:none;
    }
    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:.5rem;
      align-items:center;
      color:#4c4c4c;
      font-size:.9rem;
    }
    .dot{
      width:.4rem;height:.4rem;border-radius:50%;background:#555;display:inline-block;opacity:.5
    }

    .canvas-card{
      padding:1rem;
    }
    .frame{
      position:relative;
      border-radius:1rem;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.3)),
        radial-gradient(circle at 15% 10%, rgba(0,0,0,.035), transparent 22%),
        radial-gradient(circle at 85% 80%, rgba(0,0,0,.03), transparent 22%),
        var(--paper);
      border:1px solid rgba(0,0,0,.08);
      box-shadow: inset 0 0 0 .08rem rgba(255,255,255,.55);
      aspect-ratio: 4 / 5;
      width:100%;
    }
    svg{
      display:block;
      width:100%;
      height:auto;
    }
    .caption{
      padding:.85rem 1rem 0;
      font-size:.95rem;
      color:#494949;
      line-height:1.6;
    }
    .note{
      padding:0 1rem 1rem;
      font-size:.88rem;
      color:#666;
    }

    .stamp{
      fill:rgba(139,46,31,.88);
    }

    .hidden{
      display:none !important;
    }

    @media (min-width: 48rem){
      .topbar{padding:1.1rem 1.15rem}
      .canvas-card{padding:1.15rem}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <section class="card topbar">
        <div class="title">
          <div>
            <h1>亞古獸・水墨畫</h1>
            <p class="sub">以 SVG 繪製的水墨風數碼寶貝插畫，可切換題字與印章顯示。</p>
          </div>
          <div class="controls">
            <button id="toggleSeal" type="button">切換印章</button>
            <button id="togglePoem" class="secondary" type="button">切換題字</button>
            <button id="resetState" class="ghost" type="button">重設</button>
          </div>
        </div>
        <div class="meta">
          <span>狀態會自動儲存</span>
          <span class="dot"></span>
          <span>重新整理後仍保留</span>
        </div>
      </section>

      <section class="card canvas-card">
        <div class="frame">
          <svg viewBox="0 0 800 1000" aria-label="亞古獸水墨畫" role="img">
            <defs>
              <filter id="paperNoise">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="12" result="noise"/>
                <feColorMatrix in="noise" type="saturate" values="0"/>
                <feComponentTransfer>
                  <feFuncA type="table" tableValues="0 0 .03 .06"/>
                </feComponentTransfer>

              <filter id="inkBlur">

              <filter id="softWash">

              <linearGradient id="bgWash" x1="0" y1="0" x2="0" y2="1">

              <radialGradient id="mist" cx="50%" cy="45%" r="60%">

              <style>
                .ink-line{
                  fill:none;
                  stroke:#141414;
                  stroke-linecap:round;

                .brush-mid{ stroke:rgba(20,20,20,.68); }
                .brush-dark{ stroke:rgba(20,20,20,.95); }

                .wash{ fill:rgba(0,0,0,.12); }
                .wash2{ fill:rgba(0,0,0,.08); }
                .wash3{ fill:rgba(0,0,0,.18); }
                .sealtext{
                  font-family: "KaiTi", "STKaiti", "Noto Serif TC", serif;
                  writing-mode: vertical-rl;
                  text-orientation: upright;
                  font-size: 34px;
                  letter-spacing: 6px;
                  fill: rgba(30,30,30,.88);
                }
                .smallmark{
                  font-family: "KaiTi", "STKaiti", serif;
                  font-size: 20px;
                  fill: rgba(30,30,30,.82);
                }

            <rect x="0" y="0" width="800" height="1000" filter="url(#paperNoise)"/>

              <g id="poemGroup">
                <text x="700" y="130" class="sealtext">墨意亞古獸</text>

        </div>
        <div class="caption">以宣紙底紋、暈染墨塊與書法式筆觸，勾勒出亞古獸圓潤頭部、短肢與俏皮神情的水墨風形象。</div>
        <div class="note">可使用上方按鈕切換題字與印章；設定會儲存在本頁面。</div>
      </section>
    </div>
  </div>

  <script>
    (function(){
      const PREFIX = location.pathname + "::";
      const KEYS = {
        seal: PREFIX + "showSeal",
        poem: PREFIX + "showPoem"
      };

      const sealGroup = document.getElementById("sealGroup");
      const poemGroup = document.getElementById("poemGroup");
      const toggleSealBtn = document.getElementById("toggleSeal");
      const togglePoemBtn = document.getElementById("togglePoem");
      const resetBtn = document.getElementById("resetState");

      const state = {
        showSeal: true,
        showPoem: true
      };

      function load(){
        const seal = localStorage.getItem(KEYS.seal);
        const poem = localStorage.getItem(KEYS.poem);
        if (seal !== null) state.showSeal = seal === "true";
        if (poem !== null) state.showPoem = poem === "true";
      }

      function save(){
        localStorage.setItem(KEYS.seal, String(state.showSeal));
        localStorage.setItem(KEYS.poem, String(state.showPoem));
      }

      function render(){
        sealGroup.classList.toggle("hidden", !state.showSeal);
        poemGroup.classList.toggle("hidden", !state.showPoem);
        toggleSealBtn.textContent = state.showSeal ? "隱藏印章" : "顯示印章";
        togglePoemBtn.textContent = state.showPoem ? "隱藏題字" : "顯示題字";
      }

      toggleSealBtn.addEventListener("click", function(){
        state.showSeal = !state.showSeal;
        save();
        render();
      });

      togglePoemBtn.addEventListener("click", function(){
        state.showPoem = !state.showPoem;
        save();
        render();
      });

      resetBtn.addEventListener("click", function(){
        localStorage.removeItem(KEYS.seal);
        localStorage.removeItem(KEYS.poem);
        state.showSeal = true;
        state.showPoem = true;
        render();
      });

      load();
      render();
    })();
  </script>
</body>
</html>
